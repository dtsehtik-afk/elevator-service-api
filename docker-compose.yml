version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: elevator_user
      POSTGRES_PASSWORD: elevator_pass
      POSTGRES_DB: elevator_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elevator_user -d elevator_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: always
    ports:
      - "80:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy


volumes:
  postgres_data:
