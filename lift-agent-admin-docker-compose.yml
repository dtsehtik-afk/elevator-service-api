services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lift_agent_admin
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d lift_agent_admin"]
      interval: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://admin:password@db:5432/lift_agent_admin
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
