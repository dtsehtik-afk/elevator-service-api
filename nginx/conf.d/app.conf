server {
    listen 80;
    server_name admin.lift-agent.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://admin.lift-agent.com$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name admin.lift-agent.com;

    ssl_certificate     /etc/letsencrypt/live/lift-agent.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lift-agent.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://host.docker.internal:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name lift-agent.com www.lift-agent.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://lift-agent.com$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name www.lift-agent.com;

    ssl_certificate     /etc/letsencrypt/live/lift-agent.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lift-agent.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    return 301 https://lift-agent.com$request_uri;
}

server {
    listen 443 ssl;
    server_name lift-agent.com;

    resolver 127.0.0.11 valid=30s;

    ssl_certificate     /etc/letsencrypt/live/lift-agent.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lift-agent.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        set $upstream http://app:8000;
        proxy_pass         $upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
