# HTTP — redirect all traffic to HTTPS + serve certbot challenges
server {
    listen 80;
    server_name app.akordelevator.com;

    # Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — reverse proxy to the app
server {
    listen 443 ssl;
    server_name app.akordelevator.com;

    ssl_certificate     /etc/letsencrypt/live/app.akordelevator.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.akordelevator.com/privkey.pem;

    # Modern SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Proxy to FastAPI app
    location / {
        proxy_pass         http://app:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
